<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Buy all the latest movies at Square Eyes"
    />
    <title>Square Eyes | Home</title>
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">Home</a>
        <form id="search-form">
          <label for="search-input" class="hidden">Search Movies</label>
          <input type="search" id="search-input" placeholder="Search Movies" />
        </form>
        <a
          class="shopping-cart-container"
          href="checkout/index.html"
          aria-label="go to cart"
        >
          <img
            class="shopping-cart"
            src=""
            alt="shopping-cart icon"
            aria-label="shopping-cart placeholder"
          />
        </a>
      </nav>
    </header>
    <main>
      <div class="hidden toast-container" id="toast-container"></div>
      <h1>Square Eyes</h1>
      <h2>Movies:</h2>
      <div id="filter-container">
        <form id="filter-form">
          <!-- Filter-checkboxes get added here -->
        </form>
      </div>
      <div class="movies-container" id="movies-container">
        <!-- Add movie-cards w JS -->
      </div>
      <div id="pagination-container">
        <!-- Add pagination-controls w JS -->
        <button id="prev-button">Previous</button>
        <div id="numbered-pages-container">
          <!-- Numbered buttons get added here -->
        </div>
        <button id="next-button">Next</button>
      </div>
    </main>
    <footer>
      <a href="footer/terms-and-conditions.html">Terms and Conditions</a>
      <a href="footer/privacy-policy.html">Privacy Policy</a>
    </footer>
    <script src="js/index.js" type="module"></script>
  </body>
</html>
